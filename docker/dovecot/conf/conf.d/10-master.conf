# Default master process settings

default_process_limit = 100
default_client_limit = 1000
default_vsz_limit = 256M

# Service definitions
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
  process_limit = 500
  process_min_avail = 1
  vsz_limit = 64M
}

service imap {
  process_limit = 1024
}

service lmtp {
  inet_listener lmtp {
    address = *
    port = 24
  }
  unix_listener lmtp {
    mode = 0660
    user = vmail
    group = vmail
  }
}

service auth {
  inet_listener {
    port = 12345
  }
  unix_listener /var/spool/postfix/private/auth {
    mode = 0666
  }
  unix_listener auth-userdb {
    mode = 0600
    user = vmail
  }
  user = root
}

service auth-worker {
  user = vmail
}

service dict {
  unix_listener dict {
    mode = 0600
    user = vmail
    group = vmail
  }
}
