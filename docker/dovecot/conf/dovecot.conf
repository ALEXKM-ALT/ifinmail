## Dovecot configuration for ifinmail
## Managed by ifinmail deployment

!include_try /etc/dovecot/dovecot-ified.conf
!include_try /etc/dovecot/conf.d/*.conf

# Protocols we want to serve
protocols = imap lmtp

# Listen on all interfaces
listen = *, ::

# Base directory
base_dir = /var/run/dovecot/

# Mail location
mail_location = maildir:/var/mail/%d/%n

# Namespace configuration
namespace inbox {
  type = private
  separator = /
  prefix =
  inbox = yes

  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox Spam {
    special_use = \Junk
    auto = subscribe
  }
}

# Authentication
auth_username_format = %Lu
auth_mechanisms = plain login

# SSL/TLS
ssl = required
ssl_cert = </etc/dovecot/private/dovecot.pem
ssl_key = </etc/dovecot/private/dovecot.key
ssl_min_protocol = TLSv1.2
ssl_prefer_server_ciphers = yes

# Logging
log_path = /var/log/dovecot.log
info_log_path = /var/log/dovecot-info.log
debug_log_path = /var/log/dovecot-debug.log
auth_verbose = yes
auth_verbose_passwords = sha1
mail_debug = no

# LMTP delivery
lda_mailbox_autocreate = yes
lda_mailbox_autosubscribe = yes

# Service configuration
service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0666
  }
  unix_listener auth-userdb {
    mode = 0600
    user = vmail
  }
  inet_listener {
    port = 12345
  }
}

service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0600
    user = vmail
    group = vmail
  }
  inet_listener lmtp {
    address = *
    port = 24
  }
}

# Quota configuration
plugin {
  quota = maildir:User quota
  quota_rule = *:storage=1G
  quota_rule2 = Trash:storage=100M
  quota_rule3 = Spam:storage=50M
  quota_warning = storage=95%% quota-warning 95 %u
  quota_warning2 = storage=90%% quota-warning 90 %u

  # Sieve
  sieve = /var/mail/%d/%n/.dovecot.sieve
  sieve_default = /var/lib/dovecot/sieve/default.sieve
  sieve_dir = /var/mail/%d/%n/sieve
}
