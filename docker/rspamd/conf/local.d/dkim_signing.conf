# DKIM signing configuration
# Keys stored in /var/lib/rspamd/dkim/

allow_hdrfrom_mismatch = true;
allow_hdrfrom_mua = true;
allow_username_mismatch = true;
sign_local = true;
sign_alg = "rsa-sha256";
use_domain = "header";
use_redis = true;

# DKIM signing table
# Maps domains to their signing key selectors
domain {
  # Default catch-all - sign everything with ifinmail selector
  * {
    path = "/var/lib/rspamd/dkim/$domain.key";
    selector = "ifinmail";
  }
}

# Sign all outgoing mail
sign_condition = "return true;";

# Base directory for DKIM keys
basedir = "/var/lib/rspamd/dkim";
