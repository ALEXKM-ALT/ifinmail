# Rspamd actions configuration
# Thresholds for spam classification

reject = null
greylist = 4.0
add_header = 6.0
rewrite_subject = 8.0

# Subject rewriting
subject_re = "***SPAM*** %s"

# Apply symbol weights for common checks
symbols = {
  "DKIM_REJECT" {
    weight = 12.0
  }
  "DMARC_POLICY_REJECT" {
    weight = 15.0
  }
  "DMARC_POLICY_QUARANTINE" {
    weight = 8.0
  }
  "RBL_SPAMHAUS" {
    weight = 5.0
  }
  "RBL_BARRACUDA" {
    weight = 3.0
  }
  "MISSING_SPF" {
    weight = 3.0
  }
  "SPF_FAIL" {
    weight = 6.0
  }
  "FORGED_SENDER" {
    weight = 10.0
  }
  "FORGED_RECIPIENTS" {
    weight = 5.0
  }
  "MANY_INVISIBLE_PARTS" {
    weight = 4.0
  }
  "MANY_RECIPIENTS" {
    weight = 4.0
  }
}
