services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ifinmail
      POSTGRES_USER: ifinmail
      POSTGRES_PASSWORD: ${IFINMAIL_DB_PASSWORD:-ifinmail_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifinmail"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      IFINMAIL_DATABASE_URL: postgresql://ifinmail:${IFINMAIL_DB_PASSWORD:-ifinmail_dev}@db:5432/ifinmail
      IFINMAIL_REDIS_URL: redis://redis:6379/0
      IFINMAIL_SECRET_KEY: ${IFINMAIL_SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn ifinmail.api.app:app --host 0.0.0.0 --port 8000 --reload
      "

  smtp:
    build:
      context: .
    ports:
      - "5025:25"
    environment:
      IFINMAIL_DATABASE_URL: postgresql://ifinmail:${IFINMAIL_DB_PASSWORD:-ifinmail_dev}@db:5432/ifinmail
      IFINMAIL_SECRET_KEY: ${IFINMAIL_SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: ["ifinmail", "smtp"]

volumes:
  pgdata:
