<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Service Unavailable — ifinmail</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans',sans-serif;background:#F9FAFB;color:#111827;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.error-code{font-size:5rem;font-weight:700;color:#D1D5DB;line-height:1;margin-bottom:.75rem;letter-spacing:-.03em}
h1{font-size:1.5rem;font-weight:600;margin-bottom:.5rem;color:#111827}
p{font-size:.9375rem;color:#6B7280;margin-bottom:.5rem;max-width:420px;line-height:1.6}
p.sub{font-size:.8125rem;color:#9CA3AF;margin-bottom:2rem}
.actions{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center}
a.btn,button.btn{display:inline-flex;align-items:center;height:40px;padding:0 1.25rem;border-radius:.5rem;font-size:.875rem;font-weight:500;text-decoration:none;transition:background .15s,box-shadow .15s;cursor:pointer;font-family:inherit;border:none}
a.btn-primary,button.btn-primary{background:#1A56DB;color:#fff}
a.btn-primary:hover,button.btn-primary:hover{background:#3B6FE8}
a.btn-secondary,button.btn-secondary{background:#fff;color:#374151;border:1px solid #D1D5DB}
a.btn-secondary:hover,button.btn-secondary:hover{background:#F3F4F6;border-color:#9CA3AF}
.brand{position:fixed;bottom:1.5rem;font-size:.75rem;color:#9CA3AF}
</style>
</head>
<body>
<div class="error-code">5✕✕</div>
<h1>Service temporarily unavailable</h1>
<p>The server is currently unable to handle your request due to maintenance or capacity issues. Please try again shortly.</p>
<p class="sub">If this issue persists, please contact <a href="mailto:postmaster@ifinmail.dev" style="color:#1A56DB;text-decoration:underline">postmaster@ifinmail.dev</a></p>
<div class="actions">
<button class="btn btn-primary" onclick="location.reload()">Retry Now</button>
</div>
<div class="brand">ifinmail</div>
</body>
</html>
