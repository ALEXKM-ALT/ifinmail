<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Request Error — ifinmail</title>
<style>
/*
 * ifinmail static error page — 40x
 * Self-contained (served directly by nginx when Django is down).
 * Inline design tokens synced with ifinmail-variables.css v2.0.
 * Update this file when the design system changes.
 */
:root {
  --ifinmail-color-primary: #1A56DB;
  --ifinmail-color-primary-hover: #1648c0;
  --ifinmail-color-primary-tint: #EFF6FF;
  --ifinmail-color-brand: #0F2B5B;
  --ifinmail-color-text-primary: #111827;
  --ifinmail-color-text-secondary: #374151;
  --ifinmail-color-text-muted: #6B7280;
  --ifinmail-color-border: #D1D5DB;
  --ifinmail-color-border-light: #E5E7EB;
  --ifinmail-color-surface-1: #F9FAFB;
  --ifinmail-color-surface-2: #F3F4F6;
  --ifinmail-color-danger: #DC2626;
  --ifinmail-color-danger-tint: #FEE2E2;
  --ifinmail-font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
  --ifinmail-radius-md: 0.375rem;
  --ifinmail-radius-lg: 0.5rem;
  --ifinmail-space-4: 1rem;
  --ifinmail-space-6: 1.5rem;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--ifinmail-font-ui);
  background: var(--ifinmail-color-surface-1);
  color: var(--ifinmail-color-text-primary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  text-align: center;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.error-code {
  font-size: 5rem;
  font-weight: 700;
  color: var(--ifinmail-color-border);
  line-height: 1;
  margin-bottom: 0.75rem;
  letter-spacing: -0.03em;
}

h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }

p {
  font-size: 0.9375rem;
  color: var(--ifinmail-color-text-muted);
  margin-bottom: 0.5rem;
  max-width: 420px;
  line-height: 1.6;
}

p.sub {
  font-size: 0.8125rem;
  color: var(--ifinmail-color-border);
  margin-bottom: 2rem;
}

p.sub a {
  color: var(--ifinmail-color-primary);
  text-decoration: underline;
}

.actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  justify-content: center;
}

/* Buttons — matches .ifinmail-btn spec */
a.btn {
  display: inline-flex;
  align-items: center;
  height: 40px;
  padding: 0 1.25rem;
  border-radius: var(--ifinmail-radius-lg);
  font-size: 0.875rem;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.15s, box-shadow 0.15s;
  cursor: pointer;
  font-family: var(--ifinmail-font-ui);
}

a.btn-primary {
  background: var(--ifinmail-color-primary);
  color: #fff;
}

a.btn-primary:hover {
  background: var(--ifinmail-color-primary-hover);
}

a.btn-secondary {
  background: #fff;
  color: var(--ifinmail-color-text-secondary);
  border: 1px solid var(--ifinmail-color-border);
}

a.btn-secondary:hover {
  background: var(--ifinmail-color-surface-2);
  border-color: var(--ifinmail-color-text-muted);
}

.brand {
  position: fixed;
  bottom: 1.5rem;
  font-size: 0.75rem;
  color: var(--ifinmail-color-text-muted);
}
</style>
</head>
<body>
<div class="error-code">4✕✕</div>
<h1>Request could not be processed</h1>
<p>The server was unable to handle your request. This may be due to an invalid request, a missing page, or a rate limit.</p>
<p class="sub">If this issue persists, please contact your server administrator.</p>
<div class="actions">
  <a href="/" class="btn btn-primary">Return Home</a>
</div>
<div class="brand">ifinmail</div>
</body>
</html>
