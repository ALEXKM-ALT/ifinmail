{% load i18n %}
<table class="ifinmail-setup-table">
    {% if dns_records is not None %}{% for rec in dns_records %}
    <tr><td><strong>{{ rec.type|default:'—' }}</strong></td><td>{{ rec.name|default:'' }}</td><td{% if rec.type == 'TXT' %} class="ifinmail-dns-value"{% endif %} style="word-break:break-all;max-width:400px">{{ rec.value|default:'' }}</td></tr>
    {% empty %}
    <tr><td colspan="3" style="text-align:center;padding:24px">{% trans 'No DNS records available.' %}</td></tr>
    {% endfor %}{% endif %}
</table>
