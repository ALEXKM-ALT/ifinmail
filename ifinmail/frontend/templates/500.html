{% extends "base.html" %}

{% block title %}Server Error — {{ brand.name }}{% endblock %}

{% block content %}
<div class="ifinmail-error-page">
  <h1>500</h1>
  <p>An unexpected error occurred. The team has been notified.</p>
  <p class="ifinmail-error-detail">If this issue persists, please contact support.</p>
  <div class="ifinmail-error-actions">
    <a href="{% url 'accounts:dashboard' %}" class="ifinmail-btn ifinmail-btn--primary">Return to Dashboard</a>
    <button type="button" class="ifinmail-btn" onclick="location.reload()">Retry</button>
  </div>
</div>
{% endblock %}
