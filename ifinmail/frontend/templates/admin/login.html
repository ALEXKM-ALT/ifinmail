{% extends "base.html" %}

{% block title %}Sign In — {{ brand.name }}{% endblock %}

{% block content %}
<div class="ifinmail-login-container">
  <div class="ifinmail-login-card">
    <h1>{{ brand.name }}</h1>
    {% if error %}
      <div class="ifinmail-login-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="{% url 'accounts:login' %}">
      {% csrf_token %}
      <div class="ifinmail-form-group">
        <label class="ifinmail-label" for="email">Email</label>
        <input type="email" name="email" id="email" class="ifinmail-input" required autofocus autocomplete="email">
      </div>
      <div class="ifinmail-form-group">
        <label class="ifinmail-label" for="password">Password</label>
        <input type="password" name="password" id="password" class="ifinmail-input" required autocomplete="current-password">
      </div>
      <button type="submit" class="ifinmail-btn ifinmail-btn--primary ifinmail-btn--full">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
