<!doctype html>
<html lang="en" class="ifinmail-shell">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration verify</title>
  <link rel="stylesheet" href="file:///root/ifinmail/ifinmail/frontend/static/css/ifinmail-variables.css">
<link rel="stylesheet" href="file:///root/ifinmail/ifinmail/frontend/static/css/ifinmail-reset.css">
<link rel="stylesheet" href="file:///root/ifinmail/ifinmail/frontend/static/css/ifinmail-utilities.css">
<link rel="stylesheet" href="file:///root/ifinmail/ifinmail/frontend/static/css/ifinmail-layout.css">
<link rel="stylesheet" href="file:///root/ifinmail/ifinmail/frontend/static/css/ifinmail-components.css">
<link rel="stylesheet" href="file:///root/ifinmail/ifinmail/frontend/static/css/ifinmail-admin.css">
</head>
<body class="ifinmail-body">
  
<div class="ifinmail-reg">
  <div class="ifinmail-reg-card ifinmail-fade-in">
    <div class="ifinmail-reg-stepper"><div class="ifinmail-reg-stepper__counter">Step 3 of 5</div></div>
    <div class="ifinmail-reg-icon">Mail</div>
    <h1 class="ifinmail-reg-card__title">Check your email</h1>
    <p class="ifinmail-reg-card__subtitle">We sent a verification link to <strong>person@example.com</strong>.</p>
    <div class="ifinmail-verify-tip">If you don't see it, check your spam folder.</div>
    <button class="ifinmail-btn ifinmail-btn--ghost ifinmail-btn--full">Resend email</button>
  </div>
  <p class="ifinmail-reg-card__footer-link"><a href="#">Use a different email</a></p>
</div>

</body>
</html>
