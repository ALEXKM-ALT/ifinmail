# ifinmail full stack — single-VPS deployment
# 8 services: postgres, redis, postfix, dovecot, rspamd, telemetry, api, nginx

services:
  # --- Databases ---
  postgres:
    image: postgres:16-alpine
    environment:
      TZ: ${TZ:-UTC}
      POSTGRES_DB: ifinmail
      POSTGRES_USER: ifinmail
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?run make provision first}
      DOMAIN: ${DOMAIN}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
      DOVECOT_DB_PASSWORD: ${DOVECOT_DB_PASSWORD:?run make provision first}
      POSTFIX_DB_PASSWORD: ${POSTFIX_DB_PASSWORD:?run make provision first}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?run make provision first}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh:ro
      - ./postgres/custom.conf:/etc/postgresql/custom.conf:ro
      - ./certs:/etc/letsencrypt:ro
    command: >
      sh -c '
        echo "include_if_exists = \"/etc/postgresql/custom.conf\"" >> /etc/postgresql/postgresql.conf &&
        if [ -d "/etc/letsencrypt/live/${MAIL_HOSTNAME}" ]; then
          mkdir -p /etc/postgresql/certs &&
          cp "/etc/letsencrypt/live/${MAIL_HOSTNAME}/fullchain.pem" /etc/postgresql/certs/ &&
          cp "/etc/letsencrypt/live/${MAIL_HOSTNAME}/privkey.pem" /etc/postgresql/certs/ &&
          chown -R 999:999 /etc/postgresql/certs &&
          chmod 600 /etc/postgresql/certs/privkey.pem &&
          echo "ssl = on" >> /etc/postgresql/postgresql.conf &&
          echo "ssl_cert_file = \"/etc/postgresql/certs/fullchain.pem\"" >> /etc/postgresql/postgresql.conf &&
          echo "ssl_key_file = \"/etc/postgresql/certs/privkey.pem\"" >> /etc/postgresql/postgresql.conf &&
          echo "SSL enabled for PostgreSQL"
        fi &&
        docker-entrypoint.sh postgres
      '
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifinmail"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  redis:
    image: redis:7-alpine
    environment:
      TZ: ${TZ:-UTC}
    command: redis-server --requirepass ${REDIS_PASSWORD:?run make provision first} --appendonly yes --save 900 1 --save 300 10 --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:?run make provision first}", "ping"]
      interval: 10s
      retries: 5
    restart: unless-stopped
    mem_limit: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
  postfix:
    image: ifinmail/postfix:latest
    build: ./postfix
    environment:
      TZ: ${TZ:-UTC}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
      MAIL_HOSTNAME: ${MAIL_HOSTNAME}
      POSTFIX_DB_PASSWORD: ${POSTFIX_DB_PASSWORD:?run make provision first}
      PGSSLMODE: prefer
    volumes:
      - postfix_spool:/var/spool/postfix
      - mail_data:/var/mail/vhosts
      - ./certs/live/${MAIL_HOSTNAME}:/etc/postfix/certs:ro
      - rundir:/var/run/dovecot
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
    depends_on:
      postgres:
        condition: service_healthy
      dovecot:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "postfix status 2>/dev/null || ss -tlnp | grep -q ':25'"]
      interval: 30s
      retries: 3
      start_period: 10s

  dovecot:
    image: ifinmail/dovecot:latest
    build: ./dovecot
    environment:
      TZ: ${TZ:-UTC}
      DOVECOT_DB_PASSWORD: ${DOVECOT_DB_PASSWORD:?run make provision first}
      PGSSLMODE: prefer
    volumes:
      - mail_data:/var/mail/vhosts
      - ./certs/live/${MAIL_HOSTNAME}:/etc/dovecot/certs:ro
      - rundir:/var/run/dovecot
    ports:
      - "143:143"
      - "993:993"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 15s
    mem_limit: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "ss -tlnp | grep -q ':993' || doveadm service status imap-login 2>/dev/null"]
      interval: 30s
      retries: 3
      start_period: 15s

  rspamd:
    image: ifinmail/rspamd:latest
    build: ./rspamd
    environment:
      TZ: ${TZ:-UTC}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?run make provision first}
      RSPAMD_CONTROLLER_PASSWORD: ${RSPAMD_CONTROLLER_PASSWORD:-}
    volumes:
      - rspamd_data:/var/lib/rspamd
      - ./dkim:/etc/dkim:ro
    ports:
      - "127.0.0.1:11332:11332"   # milter (bound to localhost)
      - "127.0.0.1:11334:11334"   # web UI (bound to localhost, security)
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 15s
    mem_limit: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "rspamc stat 2>/dev/null || ss -tlnp | grep -q ':11332'"]
      interval: 30s
      retries: 3
      start_period: 10s

  # --- SSL Auto-Renewal ---
  certbot:
    image: ifinmail/certbot:latest
    build: ./certbot
    profiles:
      - certbot
    environment:
      - TZ=${TZ:-UTC}
      - COMPOSE_FILE=/config/docker-compose.yml
      - ENV_FILE=/config/.env
      - RENEWAL_INTERVAL=12h
    volumes:
      - ./certs:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/config/docker-compose.yml:ro
      - ../../provisioning/.env:/config/.env:ro
    restart: unless-stopped
    stop_grace_period: 10s
    mem_limit: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f certbot || exit 1"]
      interval: 60s
      retries: 3
      start_period: 60s
      timeout: 10s

  # --- Telemetry ---
  telemetry:
    image: docker:27-cli
    environment:
      TZ: ${TZ:-UTC}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-docker}
      TELEMETRY_LOG_FILE: /logs/telemetry.log
      TELEMETRY_SERVICE_NAME: telemetry
      TELEMETRY_POLL_INTERVAL: 10
      TELEMETRY_TAIL_LINES: 100
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../logs:/logs
      - ./telemetry/entrypoint.sh:/telemetry-entrypoint.sh:ro
    entrypoint: ["sh", "/telemetry-entrypoint.sh"]
    restart: unless-stopped
    stop_grace_period: 10s
    mem_limit: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
    healthcheck:
      test: ["CMD-SHELL", "test -w /logs/telemetry.log && docker ps >/dev/null"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s

  # --- Platform API ---
  api:
    image: ifinmail/api:latest
    build:
      context: ../..
      dockerfile: provisioning/docker/Dockerfile
    environment:
      TZ: ${TZ:-UTC}
      DB_NAME: ifinmail
      DB_USER: ifinmail_app
      DB_PASSWORD: ${APP_DB_PASSWORD:?run make provision first}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSLMODE: prefer
      DATABASE_URL: postgresql://ifinmail_app:${APP_DB_PASSWORD:?run make provision first}@postgres:5432/ifinmail?sslmode=prefer
      REDIS_URL: redis://:${REDIS_PASSWORD:?run make provision first}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?run make provision first}@redis:6379/1
      DJANGO_SECRET_KEY: ${SECRET_KEY:?run make provision first}
      DJANGO_SETTINGS_MODULE: backend.config.settings.production
      ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      CONN_MAX_AGE: 300
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:?run make provision first}
    volumes:
      - mail_data:/var/mail/vhosts:ro   # read Dovecot's Maildir
      - ./certs:/etc/letsencrypt:ro
      - static_data:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 60s
    mem_limit: 1024M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; host=os.environ['ALLOWED_HOSTS'].split(',')[0].strip(); req=urllib.request.Request('http://127.0.0.1:8000/health/', headers={'Host': host}); urllib.request.urlopen(req, timeout=5).read()\""]
      interval: 30s
      retries: 3
      start_period: 30s
      timeout: 10s

  # --- Reverse Proxy ---
  nginx:
    image: nginx:1.27-alpine
    environment:
      - TZ=${TZ:-UTC}
      - MAIL_HOSTNAME=${MAIL_HOSTNAME}
    volumes:
      - ./nginx/conf.d/ifinmail.conf:/etc/nginx/templates/ifinmail.conf.template:ro
      - ./certs:/etc/letsencrypt:ro
      - ./nginx/www:/var/www/certbot:ro
      - static_data:/app/staticfiles:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    command: "/bin/sh -c 'sed \"s|__SSL_CERT_HOSTNAME__|${MAIL_HOSTNAME}|g\" /etc/nginx/templates/ifinmail.conf.template > /etc/nginx/conf.d/default.conf && (while :; do sleep 6h; nginx -s reload; done) & exec nginx -g \"daemon off;\"'"
    restart: unless-stopped
    stop_grace_period: 10s
    mem_limit: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate --header=\"Host: $$MAIL_HOSTNAME\" -q --spider https://127.0.0.1/health/ || exit 1"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s

volumes:
  postgres_data:
  redis_data:
  postfix_spool:
  mail_data:
  rspamd_data:
  rundir:
  static_data:

networks:
  default:
    name: ifinmail-net
