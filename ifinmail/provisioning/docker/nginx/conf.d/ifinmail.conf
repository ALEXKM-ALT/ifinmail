# ifinmail nginx reverse proxy

# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
limit_conn_zone $binary_remote_addr zone=connlimit:10m;

# --- HTTP → HTTPS redirect (except ACME challenges) ---
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge for Certbot (before redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

}

# --- HTTPS main site ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # TLS — certs from Certbot via shared volume
    ssl_certificate     /etc/letsencrypt/live/__SSL_CERT_HOSTNAME__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__SSL_CERT_HOSTNAME__/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!eNULL:!EXPORT:!DES:!MD5:!PSK:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # OCSP stapling needs a trusted issuer chain; enable after certbot has a full chain.
    ssl_stapling off;
    ssl_stapling_verify off;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests;";

    # Client max body size (email attachments)
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;

    # Connection limits
    limit_conn connlimit 50;

    # Hardening: never proxy upstream errors — let Django render its own error pages
    proxy_intercept_errors off;

    # Custom error pages — served from static files (no upstream dependency)
    # Only fires for nginx-generated errors (upstream down, rate limited, request too large, etc.)
    error_page 400 401 402 403 404 405 406 408 410 411 413 414 415 416 429 /static/error-pages/40x.html;
    error_page 500 502 503 504 /static/error-pages/50x.html;

    location /static/error-pages/ {
        alias /app/staticfiles/error-pages/;
        add_header X-Robots-Tag "noindex, nofollow" always;
        internal;
    }

    # API proxy
    location / {
        # Apply general rate limit, burst of 20
        limit_req zone=general burst=20 nodelay;
        limit_conn connlimit 50;

        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy timeouts (prevent hanging connections)
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Proxy buffers (handle large responses)
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
        proxy_busy_buffers_size 16k;

        # Proxy redirect fix
        proxy_redirect http://api:8000/ https://$host/;
    }

    # Rate-limited admin panel
    location /manage-panel/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Accounts app (moderate rate limit)
    location /admin/ {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MTA-STS policy (served at https://mta-sts.<domain>/.well-known/mta-sts.json)
    location = /.well-known/mta-sts.json {
        root /var/www/certbot;
        add_header Content-Type application/json;
        add_header Cache-Control "max-age=604800";
    }

    # Email client autoconfiguration (Thunderbird / Outlook / Apple Mail)
    location ~ ^/(\.well-known/autoconfig/mail/config-v1\.1\.xml|mail/config-v1\.1\.xml|autodiscover/autodiscover\.xml)$ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }

    # Static files (from shared volume with API container)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
