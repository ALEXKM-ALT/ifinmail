# Dovecot 20-imap.conf — IMAP protocol settings for ifinmail

protocol imap {
  # IMAP IDLE polling interval (seconds) — keep reasonable for resource usage
  imap_idle_notify_interval = 120s

  # Max number of mail commands before forcing a sync
  imap_max_line_length = 64 k

  # Client workarounds for better compatibility
  imap_client_workarounds = tb-extra-mailbox-sep tb-lsub-flags

  # Session limits
  mail_max_userip_connections = 20
}
