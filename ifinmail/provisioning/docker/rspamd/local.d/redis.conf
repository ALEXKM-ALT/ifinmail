# Rspamd Redis backend — Bayes, fuzzy hashes, rate limits, greylisting
servers = "redis:6379";
password = "__REDIS_PASSWORD__";
timeout = 5;
db = "0";

# Key prefix to avoid collisions with other apps
key_prefix = "rspamd:";

# Write interval (seconds) — persist learned data periodically
write_interval = 60;

# Disable if Redis is unreachable (don't fail open for spam checks)
disabled_modules = [];
