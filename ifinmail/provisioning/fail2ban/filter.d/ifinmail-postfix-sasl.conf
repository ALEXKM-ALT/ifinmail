# ifinmail Postfix SASL fail2ban filter — targets repeated SASL auth failures only

[Definition]
failregex = ^.*postfix/(smtpd|submission|submissions)/smtpd\[\d+\]: warning: .*\[<HOST>\]: SASL [A-Z]* authentication failed:.*$
            ^.*postfix/(smtpd|submission|submissions)/smtpd\[\d+\]: fatal: no SASL authentication mechanisms.*\[<HOST>\]$

ignoreregex =
