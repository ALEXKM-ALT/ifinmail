# ifinmail Postfix fail2ban filter
# Matches SASL auth failures, SMTP AUTH failures, and general abuse

[Definition]
failregex = ^.*postfix/smtpd\[\d+\]: warning: .*\[<HOST>\]: SASL (LOGIN|PLAIN) authentication failed.*$
            ^.*postfix/smtpd\[\d+\]: warning: .*\[<HOST>\]: (reject|refused).*$
            ^.*postfix/smtpd\[\d+\]: NOQUEUE: reject: RCPT from .*\[<HOST>\]: .* (Sender address rejected|Relay access denied).*$

ignoreregex =
