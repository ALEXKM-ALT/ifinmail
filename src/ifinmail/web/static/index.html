<!DOCTYPE html>
<html lang="en">
<head>
<script>if(localStorage.getItem("ifinmail_dark")==="1"){document.documentElement.setAttribute("data-theme","dark")}</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ifinmail App</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234361ee' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='2' y='4' width='20' height='16' rx='2'/%3E%3Cpolyline points='2,12 8,12 10,15 14,15 16,12 22,12'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>if(localStorage.getItem("ifinmail_dark")==="1"){document.documentElement.setAttribute("data-theme","dark")}</script>
</head>
<body>
<div class="ifinmail-app" id="app">
  <aside class="ifinmail-sidebar" id="sidebar"></aside>
  <main class="ifinmail-main" id="main">
    <div id="offlineBanner" style="display:none;background:var(--danger);color:#fff;text-align:center;padding:6px 12px;font-size:13px;font-weight:500">You are offline — showing cached data</div>
    <div class="ifinmail-login" id="loginView">
      <h1>ifinmail App</h1>
      <p class="ifinmail-tagline">Secure, API-first email</p>
      <form id="loginForm" class="ifinmail-form">
        <input type="email" id="loginEmail" placeholder="Email" required autofocus>
        <div class="ifinmail-pw-wrap">
          <input type="password" id="loginPassword" placeholder="Password" required>
          <button type="button" class="ifinmail-pw-toggle" data-target="loginPassword" tabindex="-1"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <button type="submit" class="ifinmail-btn ifinmail-btn-primary">Sign in</button>
        <div class="ifinmail-sso-divider"><span>or continue with</span></div>
        <div class="ifinmail-sso-buttons">
          <button type="button" class="ifinmail-btn ifinmail-sso-btn" id="ssoGoogle"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Google</button>
          <button type="button" class="ifinmail-btn ifinmail-sso-btn" id="ssoMicrosoft"><svg width="18" height="18" viewBox="0 0 24 24"><rect x="2" y="2" width="9" height="9" fill="#F25022"/><rect x="13" y="2" width="9" height="9" fill="#7FBA00"/><rect x="2" y="13" width="9" height="9" fill="#00A4EF"/><rect x="13" y="13" width="9" height="9" fill="#FFB900"/></svg> Microsoft</button>
        </div>
        <p class="ifinmail-error" id="loginError"></p>
        <p style="text-align:center;font-size:13px;color:var(--text-light);margin-top:8px">
          <a href="#" id="showForgotPassword" style="color:var(--text-light)">Forgot password?</a>
          &middot;
          <a href="#" id="showRegister" style="color:var(--primary)">Create account</a>
        </p>
      </form>
      <form id="forgotForm" class="ifinmail-form" style="display:none">
        <p style="font-size:14px;color:var(--text-light);margin-bottom:8px;text-align:center">Enter your email to receive a reset link</p>
        <input type="email" id="forgotEmail" placeholder="Email" required>
        <button type="submit" class="ifinmail-btn ifinmail-btn-primary">Send reset link</button>
        <p class="ifinmail-error" id="forgotError"></p>
        <p style="text-align:center;font-size:13px;color:var(--text-light);margin-top:8px">
          <a href="#" id="showLoginFromForgot" style="color:var(--primary)">Back to sign in</a>
        </p>
      </form>
      <form id="resetForm" class="ifinmail-form" style="display:none">
        <p style="font-size:14px;color:var(--text-light);margin-bottom:8px;text-align:center">Enter your new password</p>
        <div class="ifinmail-pw-wrap">
          <input type="password" id="resetPassword" placeholder="New password" required minlength="6">
          <button type="button" class="ifinmail-pw-toggle" data-target="resetPassword" tabindex="-1"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <button type="submit" class="ifinmail-btn ifinmail-btn-primary">Reset password</button>
        <p class="ifinmail-error" id="resetError"></p>
      </form>
      <form id="registerForm" class="ifinmail-form" style="display:none">
        <input type="email" id="registerEmail" placeholder="Email" required>
        <div class="ifinmail-pw-wrap">
          <input type="password" id="registerPassword" placeholder="Password" required minlength="6">
          <button type="button" class="ifinmail-pw-toggle" data-target="registerPassword" tabindex="-1"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <button type="submit" class="ifinmail-btn ifinmail-btn-primary">Create account</button>
        <p class="ifinmail-error" id="registerError"></p>
        <p style="text-align:center;font-size:13px;color:var(--text-light);margin-top:8px">
          Already have an account? <a href="#" id="showLogin" style="color:var(--primary)">Sign in</a>
        </p>
      </form>
    </div>
    <div class="ifinmail-inbox" id="inboxView" style="display:none"></div>
    <div class="ifinmail-message" id="messageView" style="display:none"></div>
    <div class="ifinmail-compose" id="composeView" style="display:none"></div>
    <div class="ifinmail-settings" id="settingsView" style="display:none"></div>
    <div class="ifinmail-admin" id="adminView" style="display:none"></div>
    <div class="ifinmail-sandbox" id="sandboxView" style="display:none"></div>
    <div class="ifinmail-dashboard" id="dashboardView" style="display:none"></div>
    <div class="ifinmail-teams" id="teamsView" style="display:none"></div>
  </main>
</div>
<template id="sidebarTmpl">
  <div class="ifinmail-sidebar-header">
    <h2>ifinmail</h2>
  </div>
  <div class="ifinmail-accounts-container" id="sidebarAccounts">
    <div class="ifinmail-accounts-container-list" id="accountsListSidebar"></div>
    <button class="ifinmail-accounts-add-btn" id="accountsAddBtn" title="Add account">+</button>
  </div>
  <button class="ifinmail-btn ifinmail-btn-compose" id="composeBtn">+ New Message</button>
  <div class="ifinmail-nav-section-label">MAIL</div>
  <nav class="ifinmail-nav">
    <a class="ifinmail-nav-item" data-folder="INBOX"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,12 8,12 10,15 14,15 16,12 22,12"/></svg></span> Inbox <span class="ifinmail-badge" id="count-INBOX"></span></a>
    <a class="ifinmail-nav-item" data-folder="PRIORITY"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></span> Priority <span class="ifinmail-badge" id="count-PRIORITY"></span></a>
    <a class="ifinmail-nav-item" data-folder="SENT"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></span> Sent <span class="ifinmail-badge" id="count-SENT"></span></a>
    <a class="ifinmail-nav-item" data-folder="DRAFTS"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg></span> Drafts <span class="ifinmail-badge" id="count-DRAFTS"></span></a>
    <a class="ifinmail-nav-item" id="scheduledNav"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span> Scheduled <span class="ifinmail-badge" id="count-SCHEDULED"></span></a>
    <a class="ifinmail-nav-item" data-folder="ARCHIVE"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg></span> Archive <span class="ifinmail-badge" id="count-ARCHIVE"></span></a>
    <a class="ifinmail-nav-item" data-folder="SPAM"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span> Spam <span class="ifinmail-badge" id="count-SPAM"></span></a>
    <a class="ifinmail-nav-item" data-folder="TRASH"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></span> Trash <span class="ifinmail-badge" id="count-TRASH"></span></a>
    <div id="customFoldersSidebar"></div>
  </nav>
  <label class="ifinmail-unified-toggle" id="unifiedToggle" style="display:flex;align-items:center;gap:6px;padding:4px 12px;cursor:pointer;font-size:12px;color:var(--text-light);margin:2px 0">
    <input type="checkbox" id="unifiedToggleCheck" style="cursor:pointer"> Unified Inbox
  </label>
  <div class="ifinmail-nav-section-label">WORKSPACE</div>
  <nav class="ifinmail-nav">
    <a class="ifinmail-nav-item" id="dashboardNav"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span> Dashboard</a>
    <a class="ifinmail-nav-item" id="sandboxNav"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="2" y1="10" x2="22" y2="10"/></svg></span> Sandbox</a>
    <a class="ifinmail-nav-item" id="orgsNav"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Teams</a>
  </nav>
  <div class="ifinmail-nav-section-label">SYSTEM</div>
  <nav class="ifinmail-nav">
    <a class="ifinmail-nav-item" id="settingsNav"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> Settings</a>
    <a class="ifinmail-nav-item" id="darkModeToggle"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span> <span id="darkModeLabel">Dark</span></a>
    <a class="ifinmail-nav-item" id="adminNav" style="display:none"><span class="ifinmail-nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span> Admin</a>
  </nav>
  <div class="ifinmail-sidebar-footer">
    <span class="ifinmail-user-email" id="userEmail"></span>
    <a class="ifinmail-logout-link" id="logoutBtn">Sign out</a>
  </div>
</template>
<template id="inboxTmpl">
  <div class="ifinmail-toolbar">
    <div class="ifinmail-search">
      <input type="search" id="searchInput" placeholder="Search mail... (from:, to:, subject:, is:read, has:attachment, before:, after:, in:, label:)">
      <button class="ifinmail-btn ifinmail-btn-search" id="searchBtn" title="Search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
      <button class="ifinmail-btn ifinmail-btn-icon" id="filterToggleBtn" title="Toggle filters"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg></button>
      <button class="ifinmail-btn ifinmail-btn-icon" id="refreshBtn" title="Refresh"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
      <button class="ifinmail-btn ifinmail-btn-icon" id="markAllReadBtn" title="Mark all as read"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 12 5 16 9 12"/><polyline points="13 12 17 16 21 12"/><line x1="12" y1="2" x2="12" y2="8"/></svg></button>
      <button class="ifinmail-btn ifinmail-btn-icon" id="convToggleBtn" title="Toggle conversation view"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
      <span class="ifinmail-search-count" id="searchCount"></span>
    </div>
    <div id="filterPanel" class="ifinmail-filter-panel" style="display:none">
      <div class="ifinmail-filter-row">
        <div class="ifinmail-filter-field"><label>From</label><input type="text" id="filterFrom" placeholder="sender@example.com" class="ifinmail-input"></div>
        <div class="ifinmail-filter-field"><label>To</label><input type="text" id="filterTo" placeholder="recipient@example.com" class="ifinmail-input"></div>
        <div class="ifinmail-filter-field"><label>Subject</label><input type="text" id="filterSubject" placeholder="word in subject" class="ifinmail-input"></div>
      </div>
      <div class="ifinmail-filter-row">
        <div class="ifinmail-filter-field"><label>After</label><input type="date" id="filterAfter" class="ifinmail-input"></div>
        <div class="ifinmail-filter-field"><label>Before</label><input type="date" id="filterBefore" class="ifinmail-input"></div>
        <div class="ifinmail-filter-field" style="flex-direction:row;gap:12px;align-items:center">
          <label style="margin:0;white-space:nowrap">Status</label>
          <select id="filterRead" class="ifinmail-input" style="flex:1">
            <option value="">Any</option>
            <option value="read">Read</option>
            <option value="unread">Unread</option>
          </select>
        </div>
      </div>
      <div class="ifinmail-filter-row">
        <label class="ifinmail-filter-check"><input type="checkbox" id="filterAttach"> Has attachments</label>
        <label class="ifinmail-filter-check"><input type="checkbox" id="filterStarred"> Starred</label>
        <div style="display:flex;gap:6px;margin-left:auto">
          <button class="ifinmail-btn ifinmail-btn-sm" id="applyFiltersBtn">Apply</button>
          <button class="ifinmail-btn ifinmail-btn-sm" id="clearFiltersBtn">Clear</button>
        </div>
      </div>
    </div>
    <div class="ifinmail-trash-actions" id="trashActions" style="display:none">
      <button class="ifinmail-btn ifinmail-btn-sm" id="emptyTrashBtn">Empty trash</button>
      <button class="ifinmail-btn ifinmail-btn-sm" id="restoreAllBtn">Restore all</button>
    </div>
  </div>
  <div class="ifinmail-batch-bar" id="batchBar" style="display:none">
    <label class="ifinmail-batch-select-all"><input type="checkbox" id="selectAllCb"> Select all</label>
    <span class="ifinmail-batch-count" id="batchCount">0 selected</span>
    <button class="ifinmail-btn ifinmail-btn-sm ifinmail-batch-cancel" id="batchCancel" title="Clear selection">Cancel</button>
    <button class="ifinmail-btn ifinmail-btn-sm" id="batchStar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Star</button>
    <button class="ifinmail-btn ifinmail-btn-sm" id="batchRead">Read</button>
    <button class="ifinmail-btn ifinmail-btn-sm" id="batchUnread">Unread</button>
    <button class="ifinmail-btn ifinmail-btn-sm" id="batchTrash"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Trash</button>
    <div class="ifinmail-batch-move">
      <button class="ifinmail-btn ifinmail-btn-sm" id="batchMoveBtn">Move to <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><polyline points="6 9 12 15 18 9"/></svg></button>
      <div class="ifinmail-batch-move-dropdown" id="batchMoveDropdown"></div>
    </div>
  </div>
  <div class="ifinmail-message-list" id="messageList"></div>
  <div id="paginationControls" style="display:none;align-items:center;justify-content:center;padding:16px"></div>
</template>
<template id="messageRowTmpl">
  <div class="ifinmail-row" draggable="false">
    <div class="ifinmail-row-check"><input type="checkbox" class="ifinmail-row-cb"></div>
    <div class="ifinmail-row-unread-dot" title="Toggle read/unread"><svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4"/></svg></div>
    <div class="ifinmail-row-star" title="Star"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
    <div class="ifinmail-row-sender"></div>

        </div>
      </div>

      <div id="teamsMembersTab" class="ifinmail-teams-tab-content">
        <div class="card">
          <div class="card-header">
            <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:8px"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Team Members <span id="teamsMemberCount"></span></h3>
            <button class="btn btn-outline" onclick="showTeamsInvite()">+ Invite Member</button>
          </div>
          <div class="card-body">
            <ul class="ifinmail-teams-member-list" id="teamsMembersList"></ul>
          </div>
        </div>
        <div class="card" id="teamsInviteCard" style="display:none">
          <div class="card-header"><h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:8px"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/><line x1="12" y1="13" x2="12" y2="19"/><line x1="9" y1="16" x2="15" y2="16"/></svg> Invite New Member</h3></div>
          <div class="card-body">
            <div class="teams-grid">
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="teamsInviteEmail" placeholder="Email address">
              </div>
              <div class="form-group">
                <label>Role</label>
                <select id="teamsInviteRole">
                  <option value="member">Member</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>
            <button class="btn btn-primary" style="margin-top:12px" onclick="teamsSendInvite()">Send Invitation</button>
          </div>
        </div>
      </div>

      <div id="teamsInboxTab" class="ifinmail-teams-tab-content">
        <div class="card">
          <div class="card-header">
            <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:8px"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg> Shared Inbox</h3>
            <div class="ifinmail-teams-filter-group">
              <button class="ifinmail-btn ifinmail-btn-sm active" data-filter="" onclick="teamsFilterInbox(this)">All</button>
              <button class="ifinmail-btn ifinmail-btn-sm" data-filter="pending" onclick="teamsFilterInbox(this)">Pending</button>
              <button class="ifinmail-btn ifinmail-btn-sm" data-filter="assigned" onclick="teamsFilterInbox(this)">Assigned</button>
              <button class="ifinmail-btn ifinmail-btn-sm" data-filter="resolved" onclick="teamsFilterInbox(this)">Resolved</button>
            </div>
          </div>
          <div class="card-body" id="teamsInboxMessages"></div>
        </div>
      </div>

      <div id="teamsContactsTab" class="ifinmail-teams-tab-content">
        <div class="card">
          <div class="card-header">
            <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:8px"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Organization Contacts</h3>
            <button class="btn btn-outline" onclick="showTeamsAddContact()">+ Add Contact</button>
          </div>
          <div class="card-body">
            <ul class="ifinmail-teams-contact-list" id="teamsContactsList"></ul>
          </div>
        </div>
        <div class="card" id="teamsAddContactCard" style="display:none">
          <div class="card-header"><h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:8px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Add New Contact</h3></div>
          <div class="card-body">
            <div class="teams-grid">
              <div class="form-group">
                <label>Contact Email</label>
                <input type="email" id="teamsContactEmail" placeholder="Contact email">
              </div>
              <div class="form-group">
                <label>Name (optional)</label>
                <input type="text" id="teamsContactName" placeholder="Name">
              </div>
            </div>
            <button class="btn btn-primary" style="margin-top:12px" onclick="teamsAddContact()">Add Contact</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>
<template id="dashboardTmpl">
  <div class="ifinmail-dashboard-container">
    <div class="ifinmail-dashboard-header">
      <h2>Communication Dashboard</h2>
      <div class="ifinmail-dashboard-period" id="dashboardPeriod">
        <button value="7">7 days</button>
        <button value="30" class="active">30 days</button>
        <button value="90">90 days</button>
      </div>
    </div>
    <div class="ifinmail-dashboard-cards" id="dashboardCards"></div>
    <div class="ifinmail-dashboard-grid2">
      <div class="ifinmail-dashboard-section">
        <h3>Folder Distribution</h3>
        <div id="dashboardFolderChart"></div>
      </div>
      <div class="ifinmail-dashboard-section">
        <h3>Daily Volume</h3>
        <div id="dashboardDailyChart"></div>
      </div>
    </div>
    <div class="ifinmail-dashboard-grid2">
      <div class="ifinmail-dashboard-section">
        <h3>Top Senders</h3>
        <div id="dashboardTopSenders"></div>
      </div>
      <div class="ifinmail-dashboard-section">
        <h3>Top Recipients</h3>
        <div id="dashboardTopRecipients"></div>
      </div>
    </div>
    <div class="ifinmail-dashboard-section">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3>Deliverability</h3>
        <div class="ifinmail-export-btns">
          <button onclick="exportReport('csv')" class="ifinmail-btn ifinmail-btn-sm">CSV</button>
          <button onclick="exportReport('pdf')" class="ifinmail-btn ifinmail-btn-sm">PDF</button>
        </div>
      </div>
      <div id="dashboardDeliverability"></div>
    </div>
    <div class="ifinmail-dashboard-section">
      <h3>Email Tracking</h3>
      <div id="dashboardTrackingSummary" class="ifinmail-tracking-cards"></div>
    </div>
    <div class="ifinmail-dashboard-grid2">
      <div class="ifinmail-dashboard-section">
        <h3>Hourly Engagement</h3>
        <div id="dashboardHourlyChart"><canvas id="hourlyChartCanvas"></canvas></div>
      </div>
      <div class="ifinmail-dashboard-section">
        <h3>Devices</h3>
        <div id="dashboardDevicesChart"><canvas id="devicesChartCanvas"></canvas></div>
      </div>
    </div>
    <div class="ifinmail-dashboard-grid2">
      <div class="ifinmail-dashboard-section">
        <h3>Operating Systems</h3>
        <div id="dashboardOSChart"><canvas id="osChartCanvas"></canvas></div>
      </div>
      <div class="ifinmail-dashboard-section">
        <h3>Browsers</h3>
        <div id="dashboardBrowsersChart"><canvas id="browsersChartCanvas"></canvas></div>
      </div>
    </div>
    <div class="ifinmail-dashboard-section">
      <h3>Top Locations</h3>
      <div id="dashboardLocations"></div>
    </div>
    <div class="ifinmail-dashboard-section">
      <h3>Contact Engagement</h3>
      <p style="font-size:12px;color:var(--muted);margin:0 0 8px">Engagement score: 0-100 based on opens (60%) and clicks (40%).</p>
      <div id="dashboardContactEngagement"></div>
    </div>
    <div class="ifinmail-dashboard-section">
      <h3>Campaign Analytics</h3>
      <div id="dashboardCampaignStats"></div>
    </div>
  </div>
</template>
<script src="/static/app.js?v=46"></script>
</body>
</html>
